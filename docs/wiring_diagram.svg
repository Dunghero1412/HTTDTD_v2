<svg viewBox="0 0 860 620" xmlns="http://www.w3.org/2000/svg" width="860" height="620">
  <defs>
    <!-- Glow filters -->
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Arrow markers -->
    <marker id="arr-blue"   markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#00d4ff"/></marker>
    <marker id="arr-green"  markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#00ff88"/></marker>
    <marker id="arr-yellow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#ffd600"/></marker>
    <marker id="arr-orange" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#ff8c42"/></marker>
    <marker id="arr-purple" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#b388ff"/></marker>
    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20,0 L0,0 0,20" fill="none" stroke="#131e2e" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- ── Background ── -->
  <rect width="860" height="620" fill="#0a0e1a"/>
  <rect width="860" height="620" fill="url(#grid)"/>

  <!-- ── Title ── -->
  <text x="430" y="26" text-anchor="middle" font-family="monospace" font-size="13" fill="#00d4ff" letter-spacing="3">// WIRING DIAGRAM — SENSOR NODE</text>
  <text x="430" y="42" text-anchor="middle" font-family="monospace" font-size="9"  fill="#4a6080" letter-spacing="1">RPi Pico 2W · MCP3204 · OPA2134 ×4 · LoRa SX1278</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- PIEZO SENSORS -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="10" y="60"  width="110" height="52" rx="6" fill="#0f1c2e" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="65" y="80"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#00d4ff">PIEZO CH0</text>
  <text x="65" y="93"  text-anchor="middle" font-family="monospace" font-size="8"  fill="#4a6080">Tren-Trai (0,0)</text>
  <circle cx="118" cy="86" r="4" fill="#00d4ff"/>

  <rect x="10" y="140" width="110" height="52" rx="6" fill="#0f1c2e" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="65" y="160" text-anchor="middle" font-family="monospace" font-size="9"  fill="#00d4ff">PIEZO CH1</text>
  <text x="65" y="173" text-anchor="middle" font-family="monospace" font-size="8"  fill="#4a6080">Tren-Phai(100,0)</text>
  <circle cx="118" cy="166" r="4" fill="#00d4ff"/>

  <rect x="10" y="220" width="110" height="52" rx="6" fill="#0f1c2e" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="65" y="240" text-anchor="middle" font-family="monospace" font-size="9"  fill="#00d4ff">PIEZO CH2</text>
  <text x="65" y="253" text-anchor="middle" font-family="monospace" font-size="8"  fill="#4a6080">Duoi-Trai(0,100)</text>
  <circle cx="118" cy="246" r="4" fill="#00d4ff"/>

  <rect x="10" y="300" width="110" height="52" rx="6" fill="#0f1c2e" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="65" y="320" text-anchor="middle" font-family="monospace" font-size="9"  fill="#00d4ff">PIEZO CH3</text>
  <text x="65" y="333" text-anchor="middle" font-family="monospace" font-size="8"  fill="#4a6080">Duoi-Phai(100,100)</text>
  <circle cx="118" cy="326" r="4" fill="#00d4ff"/>

  <!-- Section label -->
  <text x="65" y="54" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a6080" letter-spacing="2">SENSORS</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- OPA2134 x4 -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="175" y="60"  width="100" height="52" rx="6" fill="#0f1e18" stroke="#1a4030" stroke-width="1.5"/>
  <text x="225" y="81"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#00ff88">OPA2134</text>
  <text x="225" y="93"  text-anchor="middle" font-family="monospace" font-size="8"  fill="#4a6080">Amp #1</text>
  <circle cx="175" cy="86"  r="4" fill="#00ff88"/>
  <circle cx="273" cy="86"  r="4" fill="#00ff88"/>

  <rect x="175" y="140" width="100" height="52" rx="6" fill="#0f1e18" stroke="#1a4030" stroke-width="1.5"/>
  <text x="225" y="161" text-anchor="middle" font-family="monospace" font-size="9"  fill="#00ff88">OPA2134</text>
  <text x="225" y="173" text-anchor="middle" font-family="monospace" font-size="8"  fill="#4a6080">Amp #2</text>
  <circle cx="175" cy="166" r="4" fill="#00ff88"/>
  <circle cx="273" cy="166" r="4" fill="#00ff88"/>

  <rect x="175" y="220" width="100" height="52" rx="6" fill="#0f1e18" stroke="#1a4030" stroke-width="1.5"/>
  <text x="225" y="241" text-anchor="middle" font-family="monospace" font-size="9"  fill="#00ff88">OPA2134</text>
  <text x="225" y="253" text-anchor="middle" font-family="monospace" font-size="8"  fill="#4a6080">Amp #3</text>
  <circle cx="175" cy="246" r="4" fill="#00ff88"/>
  <circle cx="273" cy="246" r="4" fill="#00ff88"/>

  <rect x="175" y="300" width="100" height="52" rx="6" fill="#0f1e18" stroke="#1a4030" stroke-width="1.5"/>
  <text x="225" y="321" text-anchor="middle" font-family="monospace" font-size="9"  fill="#00ff88">OPA2134</text>
  <text x="225" y="333" text-anchor="middle" font-family="monospace" font-size="8"  fill="#4a6080">Amp #4</text>
  <circle cx="175" cy="326" r="4" fill="#00ff88"/>
  <circle cx="273" cy="326" r="4" fill="#00ff88"/>

  <text x="225" y="54" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a6080" letter-spacing="2">CONDITIONING</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- MCP3204 -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="330" y="148" width="130" height="162" rx="8" fill="#1a1428" stroke="#3d2080" stroke-width="1.5"/>
  <text x="395" y="172" text-anchor="middle" font-family="monospace" font-size="10" fill="#b388ff">MCP3204</text>
  <text x="395" y="184" text-anchor="middle" font-family="monospace" font-size="8"  fill="#4a6080">12-bit ADC / SPI</text>

  <circle cx="332" cy="206" r="4" fill="#b388ff"/><text x="342" y="210" font-family="monospace" font-size="8" fill="#b388ff">CH0</text>
  <circle cx="332" cy="226" r="4" fill="#b388ff"/><text x="342" y="230" font-family="monospace" font-size="8" fill="#b388ff">CH1</text>
  <circle cx="332" cy="246" r="4" fill="#b388ff"/><text x="342" y="250" font-family="monospace" font-size="8" fill="#b388ff">CH2</text>
  <circle cx="332" cy="266" r="4" fill="#b388ff"/><text x="342" y="270" font-family="monospace" font-size="8" fill="#b388ff">CH3</text>

  <circle cx="458" cy="206" r="4" fill="#ffd600"/><text x="418" y="210" font-family="monospace" font-size="8" fill="#ffd600">CLK </text>
  <circle cx="458" cy="226" r="4" fill="#ffd600"/><text x="410" y="230" font-family="monospace" font-size="8" fill="#ffd600">MISO </text>
  <circle cx="458" cy="246" r="4" fill="#ffd600"/><text x="410" y="250" font-family="monospace" font-size="8" fill="#ffd600">MOSI </text>
  <circle cx="458" cy="266" r="4" fill="#ffd600"/><text x="422" y="270" font-family="monospace" font-size="8" fill="#ffd600">CS   </text>

  <circle cx="395" cy="150" r="4" fill="#ff4d6d"/><text x="376" y="146" font-family="monospace" font-size="8" fill="#ff4d6d">VDD</text>
  <circle cx="395" cy="308" r="4" fill="#4a6080"/><text x="376" y="322" font-family="monospace" font-size="8" fill="#4a6080">GND</text>

  <text x="395" y="142" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a6080" letter-spacing="2">ADC MUX</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- ZERO 2W -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="540" y="80" width="160" height="340" rx="10" fill="#12100a" stroke="#3d3010" stroke-width="2"/>
  <text x="620" y="106" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffd600">RPi ZERO 2W</text>
  <text x="620" y="118" text-anchor="middle" font-family="monospace" font-size="8"  fill="#4a6080">RP2350 · 150MHz</text>

  <circle cx="542" cy="163" r="4" fill="#ffd600"/><text x="553" y="167" font-family="monospace" font-size="8" fill="#ffd600">GP16 MISO</text>
  <circle cx="542" cy="183" r="4" fill="#ffd600"/><text x="553" y="187" font-family="monospace" font-size="8" fill="#ffd600">GP17 CS  </text>
  <circle cx="542" cy="203" r="4" fill="#ffd600"/><text x="553" y="207" font-family="monospace" font-size="8" fill="#ffd600">GP18 CLK </text>
  <circle cx="542" cy="223" r="4" fill="#ffd600"/><text x="553" y="227" font-family="monospace" font-size="8" fill="#ffd600">GP19 MOSI</text>

  <circle cx="542" cy="253" r="4" fill="#ff8c42"/><text x="553" y="257" font-family="monospace" font-size="8" fill="#ff8c42">GP0  TX  </text>
  <circle cx="542" cy="273" r="4" fill="#ff8c42"/><text x="553" y="277" font-family="monospace" font-size="8" fill="#ff8c42">GP1  RX  </text>

  <circle cx="542" cy="303" r="4" fill="#00ff88"/><text x="553" y="307" font-family="monospace" font-size="8" fill="#00ff88">GP20 CTRL</text>

  <circle cx="542" cy="333" r="4" fill="#ff4d6d"/><text x="553" y="337" font-family="monospace" font-size="8" fill="#ff4d6d">3V3 OUT </text>
  <circle cx="542" cy="353" r="4" fill="#4a6080"/><text x="553" y="357" font-family="monospace" font-size="8" fill="#4a6080">GND     </text>

  <text x="620" y="74" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a6080" letter-spacing="2">MCU</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- LoRa SX1278 -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="730" y="215" width="118" height="152" rx="8" fill="#1a0f10" stroke="#4d1520" stroke-width="1.5"/>
  <text x="789" y="237" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff4d6d">SX1278</text>
  <text x="789" y="249" text-anchor="middle" font-family="monospace" font-size="8"  fill="#4a6080">LoRa 433MHz</text>

  <circle cx="732" cy="267" r="4" fill="#ff8c42"/><text x="742" y="271" font-family="monospace" font-size="8" fill="#ff8c42">RXD</text>
  <circle cx="732" cy="287" r="4" fill="#ff8c42"/><text x="742" y="291" font-family="monospace" font-size="8" fill="#ff8c42">TXD</text>
  <circle cx="732" cy="307" r="4" fill="#ff4d6d"/><text x="742" y="311" font-family="monospace" font-size="8" fill="#ff4d6d">VCC</text>
  <circle cx="732" cy="327" r="4" fill="#4a6080"/><text x="742" y="331" font-family="monospace" font-size="8" fill="#4a6080">GND</text>
  <circle cx="732" cy="347" r="4" fill="#4a6080"/><text x="742" y="351" font-family="monospace" font-size="8" fill="#4a6080">M0/M1→GND</text>

  <!-- Antenna -->
  <line x1="789" y1="215" x2="789" y2="195" stroke="#ff4d6d" stroke-width="1.5"/>
  <line x1="789" y1="195" x2="775" y2="180" stroke="#ff4d6d" stroke-width="1.5"/>
  <line x1="789" y1="195" x2="803" y2="180" stroke="#ff4d6d" stroke-width="1.5"/>
  <text x="789" y="174" text-anchor="middle" font-family="monospace" font-size="8" fill="#ff4d6d">ANT</text>
  <text x="789" y="209" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a6080" letter-spacing="2">LORA</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- RELAY / MOTOR -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="540" y="450" width="160" height="50" rx="6" fill="#0a1a0a" stroke="#1a4030" stroke-width="1.5"/>
  <text x="620" y="471" text-anchor="middle" font-family="monospace" font-size="9" fill="#00ff88">RELAY / MOTOR</text>
  <text x="620" y="486" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a6080">Nang / Ha bia</text>
  <circle cx="542" cy="475" r="4" fill="#00ff88"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- WIRES -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Piezo → OPA (cyan) -->
  <line x1="118" y1="86"  x2="175" y2="86"  stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="118" y1="166" x2="175" y2="166" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="118" y1="246" x2="175" y2="246" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="118" y1="326" x2="175" y2="326" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- OPA → MCP CH0-CH3 (purple) -->
  <path d="M273,86  L308,86  L308,206 L332,206" stroke="#b388ff" stroke-width="1.5" fill="none" marker-end="url(#arr-purple)"/>
  <path d="M273,166 L312,166 L312,226 L332,226" stroke="#b388ff" stroke-width="1.5" fill="none" marker-end="url(#arr-purple)"/>
  <path d="M273,246 L312,246 L312,246 L332,246" stroke="#b388ff" stroke-width="1.5" fill="none" marker-end="url(#arr-purple)"/>
  <path d="M273,326 L308,326 L308,266 L332,266" stroke="#b388ff" stroke-width="1.5" fill="none" marker-end="url(#arr-purple)"/>

  <!-- MCP SPI → Pico (yellow) -->
  <path d="M458,206 L500,206 L500,203 L542,203" stroke="#ffd600" stroke-width="1.5" fill="none" marker-end="url(#arr-yellow)"/>
  <path d="M458,226 L504,226 L504,163 L542,163" stroke="#ffd600" stroke-width="1.5" fill="none" marker-end="url(#arr-yellow)"/>
  <path d="M458,246 L508,246 L508,223 L542,223" stroke="#ffd600" stroke-width="1.5" fill="none" marker-end="url(#arr-yellow)"/>
  <path d="M458,266 L512,266 L512,183 L542,183" stroke="#ffd600" stroke-width="1.5" fill="none" marker-end="url(#arr-yellow)"/>

  <!-- Pico UART → LoRa (orange) -->
  <path d="M700,253 L716,253 L716,267 L732,267" stroke="#ff8c42" stroke-width="1.5" fill="none" marker-end="url(#arr-orange)"/>
  <path d="M700,273 L720,273 L720,287 L732,287" stroke="#ff8c42" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
  <text x="706" y="262" font-family="monospace" font-size="7" fill="#ff8c42">TX→RX</text>
  <text x="706" y="282" font-family="monospace" font-size="7" fill="#ff8c42">RX←TX</text>

  <!-- GP20 → Relay (green) -->
  <path d="M542,303 L526,303 L526,475 L542,475" stroke="#00ff88" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>

  <!-- 3V3 power rails (red dashed) -->
  <line x1="542" y1="333" x2="480" y2="333"   stroke="#ff4d6d" stroke-width="1" stroke-dasharray="4,3"/>
  <path d="M480,333 L480,150 L395,150"          stroke="#ff4d6d" stroke-width="1" fill="none" stroke-dasharray="4,3" marker-end="url(#arr-blue)"/>
  <path d="M700,333 L716,333 L716,307 L732,307" stroke="#ff4d6d" stroke-width="1" fill="none" stroke-dasharray="4,3"/>

  <!-- GND rails (dim dashed) -->
  <line x1="542" y1="353" x2="522" y2="353"   stroke="#4a6080" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M522,353 L522,308 L395,308"          stroke="#4a6080" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
  <path d="M700,353 L716,353 L716,327 L732,327" stroke="#4a6080" stroke-width="1" fill="none" stroke-dasharray="3,3"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- LEGEND (bottom) -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="10" y="530" width="840" height="80" rx="6" fill="#0d1220" stroke="#1e2d45" stroke-width="1"/>
  <text x="430" y="546" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a6080" letter-spacing="2">LEGEND</text>

  <!-- row 1 -->
  <line x1="30"  y1="558" x2="58"  y2="558" stroke="#00d4ff" stroke-width="2"/>
  <text x="64"  y="562" font-family="monospace" font-size="8" fill="#c9d6e3">Piezo Signal</text>

  <line x1="160" y1="558" x2="188" y2="558" stroke="#b388ff" stroke-width="2"/>
  <text x="194" y="562" font-family="monospace" font-size="8" fill="#c9d6e3">Analog OPA→MCP</text>

  <line x1="320" y1="558" x2="348" y2="558" stroke="#ffd600" stroke-width="2"/>
  <text x="354" y="562" font-family="monospace" font-size="8" fill="#c9d6e3">SPI Bus</text>

  <line x1="430" y1="558" x2="458" y2="558" stroke="#ff8c42" stroke-width="2"/>
  <text x="464" y="562" font-family="monospace" font-size="8" fill="#c9d6e3">UART (LoRa)</text>

  <line x1="570" y1="558" x2="598" y2="558" stroke="#00ff88" stroke-width="2"/>
  <text x="604" y="562" font-family="monospace" font-size="8" fill="#c9d6e3">GPIO Control</text>

  <!-- row 2 -->
  <line x1="30"  y1="580" x2="58"  y2="580" stroke="#ff4d6d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="64"  y="584" font-family="monospace" font-size="8" fill="#c9d6e3">3.3V Power</text>

  <line x1="160" y1="580" x2="188" y2="580" stroke="#4a6080" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="194" y="584" font-family="monospace" font-size="8" fill="#c9d6e3">GND</text>

  <!-- border -->
  <rect x="2" y="2" width="856" height="616" rx="10" fill="none" stroke="#1e2d45" stroke-width="1.5"/>
</svg>
